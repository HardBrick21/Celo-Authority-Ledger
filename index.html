<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celo Authority Ledger - Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); }
        .card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .level-execute { background: linear-gradient(135deg, #f97316, #ea580c); }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white">
    <div class="container mx-auto px-4 py-8">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-bold mb-2">🧱 Celo Authority Ledger</h1>
            <p class="text-gray-400">Permission Management for Celo Stablecoins</p>
            <div class="mt-4 flex justify-center gap-4">
                <span class="px-3 py-1 rounded-full text-sm bg-orange-500/20 text-orange-400">Celo Alfajores</span>
            </div>
        </header>

        <div id="connectionStatus" class="card rounded-xl p-4 mb-8">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div id="statusDot" class="w-3 h-3 rounded-full bg-red-500"></div>
                    <span id="statusText" class="text-gray-300">Not Connected</span>
                </div>
                <button id="connectBtn" onclick="connectWallet()" class="px-4 py-2 bg-orange-600 hover:bg-orange-700 rounded-lg transition">Connect Wallet</button>
            </div>
        </div>

        <div class="grid lg:grid-cols-2 gap-8">
            <div class="card rounded-xl p-6">
                <h2 class="text-xl font-semibold mb-4">📝 Grant Authority</h2>
                <div class="space-y-4">
                    <input type="text" id="agentAddress" placeholder="Agent Address (0x...)" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2">
                    <select id="authorityLevel" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2">
                        <option value="1">OBSERVE</option>
                        <option value="2">SUGGEST</option>
                        <option value="3">EXECUTE</option>
                    </select>
                    <input type="number" id="creditLimit" value="1000" placeholder="Credit Limit (cUSD)" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2">
                    <input type="number" id="duration" value="86400" placeholder="Duration (seconds)" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2">
                    <button onclick="grantAuthority()" class="w-full py-2 bg-orange-600 hover:bg-orange-700 rounded-lg">Grant</button>
                </div>
            </div>

            <div class="card rounded-xl p-6">
                <h2 class="text-xl font-semibold mb-4">💰 Issue Micro-Loan</h2>
                <div class="space-y-4">
                    <input type="text" id="borrowerAddress" placeholder="Borrower Address (0x...)" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2">
                    <input type="number" id="loanAmount" placeholder="Loan Amount (cUSD)" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2">
                    <button onclick="issueMicroLoan()" class="w-full py-2 bg-green-600 hover:bg-green-700 rounded-lg">Issue Loan</button>
                </div>
            </div>

            <div class="card rounded-xl p-6">
                <h2 class="text-xl font-semibold mb-4">🔍 Check Authority</h2>
                <div class="space-y-4">
                    <input type="text" id="checkAgentAddress" placeholder="Agent Address" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2">
                    <button onclick="checkAuthority()" class="w-full py-2 bg-blue-600 hover:bg-blue-700 rounded-lg">Check</button>
                    <div id="authorityResult" class="hidden bg-white/5 rounded-lg p-4"></div>
                </div>
            </div>

            <div class="card rounded-xl p-6">
                <h2 class="text-xl font-semibold mb-4">⚠️ Revoke Authority</h2>
                <div class="space-y-4">
                    <input type="text" id="revokeAgentAddress" placeholder="Agent Address" class="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-2">
                    <button onclick="revokeAuthority()" class="w-full py-2 bg-red-600 hover:bg-red-700 rounded-lg">Revoke</button>
                </div>
            </div>
        </div>

        <div class="card rounded-xl p-6 mt-8">
            <h2 class="text-xl font-semibold mb-4">📜 Transaction Log</h2>
            <div id="txLog" class="space-y-2 max-h-64 overflow-y-auto"></div>
        </div>
    </div>

    <script>
        const AUTHORITY_ADDRESS = '0x0000000000000000000000000000000000000000'; // Replace with deployed address
        const AUTHORITY_ABI = [
            "function grantAuthority(address agent, uint8 level, bytes32 scope, uint256 duration, uint256 creditLimit) external returns (bytes32)",
            "function issueMicroLoan(address borrower, uint256 amount) external returns (bytes32)",
            "function checkAuthority(address agent, uint8 required) external view returns (bool hasAuthority, uint8 current)",
            "function getAgentHistory(address agent) external view returns (bytes32[] memory)"
        ];

        let provider, signer, contract;

        async function connectWallet() {
            if (typeof window.ethereum === 'undefined') {
                alert('Please install MetaMask!');
                return;
            }
            try {
                provider = new ethers.BrowserProvider(window.ethereum);
                await provider.send('eth_requestAccounts', []);
                signer = await provider.getSigner();
                contract = new ethers.Contract(AUTHORITY_ADDRESS, AUTHORITY_ABI, signer);
                
                const address = await signer.getAddress();
                document.getElementById('statusDot').className = 'w-3 h-3 rounded-full bg-green-500 pulse';
                document.getElementById('statusText').textContent = `Connected: ${address.slice(0,6)}...${address.slice(-4)}`;
                document.getElementById('connectBtn').textContent = 'Connected';
                document.getElementById('connectBtn').disabled = true;
                log('Connected to wallet: ' + address);
            } catch (err) {
                alert('Connection failed: ' + err.message);
            }
        }

        async function grantAuthority() {
            if (!contract) return alert('Connect wallet first!');
            const agent = document.getElementById('agentAddress').value;
            const level = parseInt(document.getElementById('authorityLevel').value);
            const creditLimit = parseInt(document.getElementById('creditLimit').value);
            const duration = parseInt(document.getElementById('duration').value);
            if (!agent) return alert('Enter agent address!');
            try {
                const tx = await contract.grantAuthority(agent, level, ethers.ZeroHash, duration, creditLimit);
                log(`Granting level ${level} to ${agent} with ${creditLimit} cUSD credit...`);
                await tx.wait();
                log(`✅ Authority granted!`);
            } catch (err) {
                log(`❌ Error: ${err.message}`);
            }
        }

        async function issueMicroLoan() {
            if (!contract) return alert('Connect wallet first!');
            const borrower = document.getElementById('borrowerAddress').value;
            const amount = parseInt(document.getElementById('loanAmount').value);
            if (!borrower) return alert('Enter borrower address!');
            try {
                const tx = await contract.issueMicroLoan(borrower, amount);
                log(`Issuing ${amount} cUSD loan to ${borrower}...`);
                await tx.wait();
                log(`✅ Micro-loan issued!`);
            } catch (err) {
                log(`❌ Error: ${err.message}`);
            }
        }

        async function checkAuthority() {
            if (!contract) return alert('Connect wallet first!');
            const agent = document.getElementById('checkAgentAddress').value;
            if (!agent) return alert('Enter agent address!');
            try {
                const result = await contract.checkAuthority(agent, 0);
                const levels = ['REVOKED', 'OBSERVE', 'SUGGEST', 'EXECUTE'];
                const resultDiv = document.getElementById('authorityResult');
                resultDiv.classList.remove('hidden');
                resultDiv.innerHTML = `
                    <div class="flex justify-between"><span>Level:</span><span class="font-bold">${levels[result.current]}</span></div>
                    <div class="flex justify-between"><span>Has Authority:</span><span>${result.hasAuthority ? '✅' : '❌'}</span></div>
                `;
                log(`Checked authority for ${agent}: Level ${levels[result.current]}`);
            } catch (err) {
                log(`❌ Error: ${err.message}`);
            }
        }

        async function revokeAuthority() {
            if (!contract) return alert('Connect wallet first!');
            const agent = document.getElementById('revokeAgentAddress').value;
            if (!agent) return alert('Enter agent address!');
            try {
                const tx = await contract.revokeAuthority(agent, ethers.ZeroHash);
                log(`Revoking authority for ${agent}...`);
                await tx.wait();
                log(`✅ Authority revoked!`);
            } catch (err) {
                log(`❌ Error: ${err.message}`);
            }
        }

        function log(msg) {
            const logEl = document.getElementById('txLog');
            const time = new Date().toLocaleTimeString();
            logEl.innerHTML = `<div class="text-sm"><span class="text-gray-500">[${time}]</span> ${msg}</div>` + logEl.innerHTML;
        }
    </script>
</body>
</html>
